worker_processes auto;
pid /tmp/nginx.pid;

events { worker_connections 4096; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  client_max_body_size 2m;
  keepalive_timeout 30s;
  send_timeout 30s;

  log_format json escape=json '{"time":"$time_iso8601","request_id":"$request_id",'
    '"remote_addr":"$remote_addr","method":"$request_method","uri":"$uri",'
    '"status":$status,"bytes":$body_bytes_sent,"request_time":$request_time}';
  access_log /dev/stdout json;
  error_log /dev/stderr warn;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

  upstream observatory_api {
    server api:3000;
    keepalive 64;
  }

  server {
    listen 8080;

    # Metrics remain available on the internal API network but are not exposed publicly.
    location = /metrics {
      return 404;
    }

    location / {
      limit_req zone=api_limit burst=40 nodelay;
      proxy_pass http://observatory_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 5s;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
    }
  }
}
