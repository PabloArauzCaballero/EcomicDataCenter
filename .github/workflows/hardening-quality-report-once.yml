name: hardening-quality-report-once

on:
  push:
    branches: [HARDENING]

permissions:
  contents: write

jobs:
  report:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: HARDENING
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.16.0
          cache: yarn
      - run: corepack enable
      - run: yarn install --frozen-lockfile --non-interactive
      - name: Capture quality diagnostics and remove one-time workflow
        run: |
          if yarn quality:all > docs/hardening/quality-verification.txt 2>&1; then
            printf 'QUALITY PASSED\n' > docs/hardening/quality-verification.txt
          fi
          rm .github/workflows/hardening-quality-report-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: capture final quality diagnostics"
          git push origin HEAD:HARDENING
