name: hardening-test-diagnostics

on:
  pull_request:
  push:
    branches: [HARDENING]

permissions:
  contents: read

concurrency:
  group: hardening-test-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.16.0
          cache: yarn
      - run: corepack enable
      - run: yarn install --frozen-lockfile --non-interactive --silent
      - name: Run ingestion tests
        run: yarn jest src/modules/ingestion --runInBand --verbose
