name: backend-quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    services:
      postgres:
        image: postgres:17.5-alpine
        env:
          POSTGRES_DB: observatorio_economico
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d observatorio_economico"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: 'true'
      NODE_ENV: test
      APP_HOST: 127.0.0.1
      APP_PORT: 3000
      APP_NAME: observatorio-economico-core
      API_PREFIX: api
      API_VERSION: v1
      CORS_ORIGINS: http://localhost:3001
      DATABASE_MIGRATOR_URL: postgresql://observatory_migrator:migrator@127.0.0.1:5432/observatorio_economico
      DATABASE_WRITER_URL: postgresql://observatory_writer:writer@127.0.0.1:5432/observatorio_economico
      DATABASE_READER_URL: postgresql://observatory_reader:reader@127.0.0.1:5432/observatorio_economico
      BACKUP_DATABASE_URL: postgresql://observatory_backup:backup@127.0.0.1:5432/observatorio_economico
      DATABASE_SSL: 'false'
      AUTH_MODE: disabled
      SWAGGER_ENABLED: 'false'
      METRICS_ENABLED: 'true'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.16.0
          cache: yarn
      - run: corepack enable
      - name: Require reproducible lockfile
        run: test -f yarn.lock
      - run: yarn install --frozen-lockfile --non-interactive
      - name: Audit production dependencies
        id: dependency-audit
        continue-on-error: true
        run: yarn security:audit
      - name: Record dependency audit release blocker
        if: steps.dependency-audit.outcome == 'failure'
        run: echo '::warning title=Dependency audit::The package audit reported a high-or-critical advisory or registry failure. Engineering gates continue, but production approval remains blocked until the audit is reviewed.'
      - name: Validate Docker Compose topology
        run: cp .env.example .env && yarn compose:validate
      - name: Validate host-development Compose override
        run: docker compose -f docker-compose.yml -f docker-compose.local.yml config --quiet
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Bootstrap least-privilege database roles
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d observatorio_economico <<'SQL'
          CREATE ROLE backend_migrator NOLOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS;
          CREATE ROLE backend_writer NOLOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS;
          CREATE ROLE backend_reader NOLOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS;
          CREATE ROLE backup_operator NOLOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS;
          CREATE ROLE observatory_migrator LOGIN INHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS PASSWORD 'migrator';
          CREATE ROLE observatory_writer LOGIN INHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS PASSWORD 'writer';
          CREATE ROLE observatory_reader LOGIN INHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS PASSWORD 'reader';
          CREATE ROLE observatory_backup LOGIN INHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS PASSWORD 'backup';
          GRANT backend_migrator TO observatory_migrator;
          GRANT backend_writer TO observatory_writer;
          GRANT backend_reader TO observatory_reader;
          GRANT backup_operator TO observatory_backup;
          ALTER ROLE observatory_reader SET default_transaction_read_only = on;
          REVOKE CREATE ON DATABASE observatorio_economico FROM PUBLIC;
          REVOKE CREATE ON SCHEMA public FROM PUBLIC;
          GRANT CONNECT, CREATE ON DATABASE observatorio_economico TO backend_migrator;
          GRANT CONNECT ON DATABASE observatorio_economico TO backend_writer, backend_reader, backup_operator;
          SQL
      - run: yarn format:check
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn quality:files
      - run: yarn quality:syntax
      - run: yarn quality:naming
      - run: yarn quality:imports
      - run: yarn quality:diagrams
      - run: yarn quality:clean-code
      - run: yarn quality:architecture
      - run: yarn quality:physical-model
      - run: yarn quality:seeds
      - run: yarn quality:persistence
      - run: yarn quality:use-cases
      - run: yarn quality:security
      - run: yarn quality:async-scope
      - run: yarn quality:operations
      - run: yarn quality:project
      - run: yarn quality:openapi
      - run: yarn quality:routes
      - name: Test common and configuration
        run: yarn jest src/common src/config --runInBand --passWithNoTests
      - name: Test database
        run: yarn jest src/database --runInBand --passWithNoTests
      - name: Test governance
        run: yarn jest src/modules/governance --runInBand --passWithNoTests
      - name: Test ingestion
        run: yarn jest src/modules/ingestion --runInBand --passWithNoTests
      - name: Test provenance and quality
        run: yarn jest src/modules/provenance src/modules/quality --runInBand --passWithNoTests
      - name: Test query and health
        run: yarn jest src/modules/query src/modules/health --runInBand --passWithNoTests
      - name: Test complete suite
        run: yarn test
      - name: Verify migration install, upgrade and rollback cycle
        run: yarn db:verify:migrations
      - run: yarn db:migrate
      - name: Verify PostgreSQL privilege matrix
        run: sh scripts/verify_database_privileges.sh
      - run: yarn db:seed:boot && yarn db:seed:boot
      - run: yarn db:seed:mock && yarn db:seed:mock
      - run: yarn db:seed:verify
      - name: Confirm mock seeds are rejected in production
        run: AUTH_MODE=jwks AUTH_JWKS_URI=https://identity.example.test/jwks AUTH_ISSUER=https://identity.example.test/ AUTH_AUDIENCE=observatorio NODE_ENV=production yarn db:seed:mock && exit 1 || exit 0
      - run: yarn build
      - name: Build hardened runtime image
        run: docker build --target runtime -t observatorio-economico:${{ github.sha }} .
      - name: Export OpenAPI
        id: openapi-export
        continue-on-error: true
        run: |
          mkdir -p artifacts/openapi
          yarn openapi:export > artifacts/openapi/export.log 2>&1
      - name: Upload OpenAPI diagnostics
        if: steps.openapi-export.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: openapi-export-log
          path: artifacts/openapi/export.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce OpenAPI export success
        if: steps.openapi-export.outcome == 'failure'
        run: exit 1
      - run: python scripts/validate_openapi.py
      - run: python scripts/validate_contract_routes.py
      - run: python scripts/generate_postman.py
      - name: Confirm generated contracts have no drift
        run: git diff --exit-code -- docs/endpoints/openapi.yaml docs/postman/collection.json
      - name: Start full local Docker stack
        run: docker compose up --build -d
      - name: Seed full local Docker stack
        run: yarn local:seed
      - name: Verify full local Docker stack
        env:
          SMOKE_BASE_URL: http://127.0.0.1:8080
        run: yarn local:verify
      - name: Capture full local stack logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=300
      - name: Stop full local Docker stack
        if: always()
        run: docker compose down --volumes --remove-orphans
