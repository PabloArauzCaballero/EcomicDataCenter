components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
          additionalProperties: false
          required:
          - code
          - message
        requestId:
          type: string
      additionalProperties: false
      required:
      - error
      - requestId
    OrganizationInput:
      type: object
      properties:
        parentOrganizationId: *id002
        code:
          type: string
          maxLength: 50
        legalName:
          type: string
        shortName:
          type: string
        organizationType:
          type: string
        countryCode:
          type: string
          pattern: ^[A-Z]{2}$
        officialStatisticsProducer:
          type: boolean
        isActive:
          type: boolean
        validFrom: &id005
          type: string
          format: date
        validTo: *id005
      additionalProperties: false
      required:
      - code
      - legalName
      - shortName
      - organizationType
      - countryCode
      - officialStatisticsProducer
      - validFrom
    SourceInput:
      type: object
      properties:
        organizationId: *id002
        frequencyId: *id002
        code:
          type: string
        name:
          type: string
        sourceType:
          type: string
        accessMethod:
          type: string
        officialUri:
          type: string
          format: uri
        licenseCode:
          type: string
        activeFrom: *id005
        activeTo: *id005
        isActive:
          type: boolean
      additionalProperties: false
      required:
      - organizationId
      - code
      - name
      - sourceType
      - accessMethod
    SourceArtifactInput:
      type: object
      properties:
        sourceId: *id002
        artifactType:
          type: string
        originalFilename:
          type: string
        originalUri:
          type: string
          format: uri
        storageUri:
          type: string
        mimeType:
          type: string
        sha256:
          type: string
          pattern: ^[a-f0-9]{64}$
        publicationDate: *id005
        retrievedAt:
          type: string
          format: date-time
        fileSizeBytes:
          type: string
          pattern: ^\d+$
        metadataJson:
          type: object
          additionalProperties: true
      additionalProperties: false
      required:
      - sourceId
      - artifactType
      - storageUri
      - sha256
      - retrievedAt
    DimensionValue:
      type: object
      properties:
        dimensionDefinitionId: *id002
        codeItemId: *id002
        classificationItemId: *id002
        geographicUnitId: *id002
        textValue:
          type: string
        numericValue:
          type: string
        dateValue: *id005
      additionalProperties: false
      required:
      - dimensionDefinitionId
    MeasureValue:
      type: object
      properties:
        measureDefinitionId: *id002
        numericValue:
          type: string
        textValue:
          type: string
        booleanValue:
          type: boolean
      additionalProperties: false
      required:
      - measureDefinitionId
    AttributeValue:
      type: object
      properties:
        attributeDefinitionId: *id002
        codeItemId: *id002
        numericValue:
          type: string
        textValue:
          type: string
        booleanValue:
          type: boolean
      additionalProperties: false
      required:
      - attributeDefinitionId
    ObservationRecord:
      type: object
      properties:
        indicatorVersionId: *id002
        frequencyId: *id002
        unitMeasureId: *id002
        periodStart: *id005
        periodEnd: *id005
        periodCode:
          type: string
        referenceDate: *id005
        dimensions:
          type: array
          items:
            $ref: '#/components/schemas/DimensionValue'
          maxItems: 50
        measures:
          type: array
          items:
            $ref: '#/components/schemas/MeasureValue'
          maxItems: 50
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/AttributeValue'
          maxItems: 50
        confidentialityStatus:
          type: string
        publicationDate: *id005
        vintageDate: *id005
        revisionReason:
          type: string
      additionalProperties: false
      required:
      - frequencyId
      - periodStart
      - periodEnd
      - periodCode
      - dimensions
      - measures
      - confidentialityStatus
      - vintageDate
    RegisterObservationInput:
      type: object
      properties:
        batchCode:
          type: string
          minLength: 3
          maxLength: 80
        datasetVersionId: *id002
        sourceArtifactId: *id002
        submittedByOrganizationId: *id002
        record:
          $ref: '#/components/schemas/ObservationRecord'
      additionalProperties: false
      required:
      - batchCode
      - datasetVersionId
      - sourceArtifactId
      - submittedByOrganizationId
      - record
    ObservationBatchInput:
      type: object
      properties:
        datasetVersionId: *id002
        sourceArtifactId: *id002
        submittedByOrganizationId: *id002
        batchCode:
          type: string
        entryMethod:
          type: string
          enum:
          - FILE
          - API
          - SDMX
          - DATABASE
          - MANUAL
        notes:
          type: string
        records:
          type: array
          items:
            $ref: '#/components/schemas/ObservationRecord'
          maxItems: 500
      additionalProperties: false
      required:
      - datasetVersionId
      - sourceArtifactId
      - submittedByOrganizationId
      - batchCode
      - entryMethod
      - records
    RegistrationResult:
      type: object
      properties:
        status:
          type: string
          enum:
          - PUBLISHED
          - REJECTED
          - UNCHANGED
        batchId: *id002
        seriesId: *id002
        observationId:
          type: string
          pattern: ^\d+$
        observationRevisionId:
          type: string
          pattern: ^\d+$
        revisionNumber:
          type: integer
          minimum: 1
        qualityIssueIds:
          type: array
          items: *id002
      additionalProperties: false
      required:
      - status
      - batchId
      - seriesId
      - observationId
      - qualityIssueIds
    BatchRecordResult:
      type: object
      properties:
        index:
          type: integer
          minimum: 0
        status:
          type: string
          enum:
          - PUBLISHED
          - REJECTED
          - UNCHANGED
          - INVALID
        observationId:
          type: string
          pattern: ^\d+$
        revisionId:
          type: string
          pattern: ^\d+$
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          additionalProperties: false
          required:
          - code
          - message
      additionalProperties: false
      required:
      - index
      - status
    BatchImportResult:
      type: object
      properties:
        batchId: *id002
        status:
          type: string
          enum:
          - COMMITTED
          - PARTIAL
          - REJECTED
        receivedCount:
          type: integer
          minimum: 1
        acceptedCount:
          type: integer
          minimum: 0
        rejectedCount:
          type: integer
          minimum: 0
        records:
          type: array
          items:
            $ref: '#/components/schemas/BatchRecordResult'
          maxItems: 500
      additionalProperties: false
      required:
      - batchId
      - status
      - receivedCount
      - acceptedCount
      - rejectedCount
      - records
    DataQueryInput:
      type: object
      properties:
        datasetVersionId: *id002
        indicatorVersionId: *id002
        periodFrom: *id005
        periodTo: *id005
        vintageDate: *id005
        dimensions:
          type: array
          items:
            $ref: '#/components/schemas/DimensionValue'
          maxItems: 20
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 200
        sortDirection:
          type: string
          enum:
          - asc
          - desc
      additionalProperties: false
      required:
      - datasetVersionId
    VersionTransitionInput:
      type: object
      properties:
        targetStatus:
          type: string
      additionalProperties: false
      required:
      - targetStatus
    IssueTransitionInput:
      type: object
      properties:
        targetStatus:
          type: string
          enum:
          - TRIAGED
          - IN_CORRECTION
          - RESOLVED
          - VERIFIED
          - CLOSED
          - REOPENED
          - DISMISSED
        resolutionNotes:
          type: string
      additionalProperties: false
      required:
      - targetStatus
    DomainInput:
      type: object
      required:
      - code
      - name
      additionalProperties: true
    ConceptInput:
      type: object
